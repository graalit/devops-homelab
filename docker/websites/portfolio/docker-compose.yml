networks:
  proxy:
    external: true
  internal:
    external: true

services:
  portfolio:
    image: node:20-alpine
    container_name: portfolio
    restart: unless-stopped
    working_dir: /app/api
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    command: sh -c "npm install --omit=dev && node server.js"
    environment:
      - NODE_ENV=production
      - TZ=Europe/Paris
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=portfolio_mcarvalho
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${PORTFOLIO_JWT_SECRET}
      - JWT_EXPIRES_IN=8h
      - ALLOWED_ORIGIN=https://mcarvalho.work
    networks:
      - proxy
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/portfolio"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.portfolio.rule=Host(`mcarvalho.work`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3001"
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
